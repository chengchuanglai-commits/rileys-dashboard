name: DeepSeek 广池 edge 验证

# 用便宜的 DeepSeek 对选股器「全部」候选(~20只)广撒分析，快速+广撒攒 edge 样本。
# 完全独立于 Haiku/Anthropic 管线(Anthropic 没余额也照跑)。自带选股器,不依赖主流程提交。
# 目标:2 周 ~80 笔已平仓样本 → 统计判定 AI 信号有没有 edge → 决定上不上 $2000 实盘。

on:
  schedule:
    - cron: '0 12 * * 1-5'   # 12:00 UTC,主信号(11:30)之后,错开提交
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: trading-pipeline    # 与主管线共用,防同时提交撞车
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.c.outputs.run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - id: c
        run: |
          if [ "$(date -u +%u)" -ge 6 ]; then
            echo "周末跳过"; echo "run=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          # 幂等:定时器迟到导致重复触发时,若今日广撒已完成则跳过(防双花)。手动 dispatch 始终放行。
          if [ "${{ github.event_name }}" = "schedule" ] && [ -f "dashboard/trading-signals-history/deepseek/$(date -u +%F)-deepseek.json" ]; then
            echo "今日广撒已完成,跳过迟到的重复定时触发"; echo "run=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "run=true" >> "$GITHUB_OUTPUT"

  deepseek:
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install yfinance lxml "git+https://github.com/TauricResearch/TradingAgents.git"

      - name: 飞书通知:广撒开始
        continue-on-error: true
        env:
          NOTIFY_WEBHOOK: ${{ secrets.NOTIFY_WEBHOOK }}
        run: |
          NOTIFY_MESSAGE="🤖 DeepSeek 广撒开始（约30分钟）
$(date -u +%Y-%m-%d) · 广撒选股器全部候选 → 分析信号 → 更新 H-DS + edge
（交易信号系统）" python3 scripts/notify-webhook.py

      - name: 自带选股器(无 Anthropic 成本)
        env:
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        run: python scripts/screen-stocks.py

      - name: DeepSeek 广池分析(全部候选)
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/generate-deepseek-shadow.py

      - name: 飞书通知:广撒结果(带信号)
        continue-on-error: true
        env:
          NOTIFY_WEBHOOK: ${{ secrets.NOTIFY_WEBHOOK }}
        run: |
          python3 - <<'EOF'
          import json, os, glob
          files = sorted(glob.glob("dashboard/trading-signals-history/deepseek/*-deepseek.json"))
          if not files:
              print("无 deepseek 文件,跳过"); raise SystemExit(0)
          d = json.load(open(files[-1], encoding="utf-8"))
          sg = d.get("signals", []); av = d.get("all_verdicts", [])
          lines = [f"🤖 DeepSeek 广撒完成 {d.get('date','')}",
                   f"分析 {len(av)} 只 · 可操作 {len(sg)} 条（进 H-DS）\n"]
          for s in sg:
              icon = "🟢" if s.get("action") == "BUY" else "🔴"
              lines.append(f"{icon} {s.get('action')} {s.get('ticker')} @ ${s.get('current_price')}")
          if not sg:
              lines.append("（今日无可操作信号）")
          lines.append("\n（交易信号系统）")
          os.environ["NOTIFY_MESSAGE"] = "\n".join(lines)
          import runpy
          runpy.run_path("scripts/notify-webhook.py", run_name="__main__")
          EOF

      - name: 更新 H-DS 模拟盘
        continue-on-error: true   # sim 更新失败也别丢掉已分析出的 deepseek 信号(后面照样提交)
        run: python scripts/backfill-portfolio-hds.py

      - name: 更新 edge 分析
        continue-on-error: true
        run: python scripts/analyze-signal-edge.py

      - name: 查 DeepSeek 余额(不足推飞书)
        if: always()
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          NOTIFY_WEBHOOK: ${{ secrets.NOTIFY_WEBHOOK }}
        run: python scripts/check-deepseek-balance.py

      - name: 提交
        if: always()
        run: |
          git config user.name "deepseek-broad-bot"
          git config user.email "deepseek-broad-bot@users.noreply.github.com"
          git add dashboard/trading-signals-history/deepseek/ 2>/dev/null || true
          git add data/portfolio_hds.json dashboard/portfolio-hds.js 2>/dev/null || true
          git add dashboard/signal-edge.js data/screened-stocks.json data/screened-stocks-history/ 2>/dev/null || true
          V=$(date -u +%Y%m%d%H%M%S)
          echo "window.DASHBOARD_VERSION = \"$V\";" > dashboard/version.js
          sed -i "s/var BUILD=\"[0-9]*\"/var BUILD=\"$V\"/" dashboard/index.html
          git add dashboard/version.js dashboard/index.html
          git diff --staged --quiet || git commit -m "DeepSeek 广池 edge 验证 $(date -u +%Y-%m-%d)"
          for i in 1 2 3 4 5; do git pull --rebase origin main && git push origin main && exit 0; sleep 5; done
          exit 1

      - name: 飞书通知:广撒失败
        if: failure()
        continue-on-error: true
        env:
          NOTIFY_WEBHOOK: ${{ secrets.NOTIFY_WEBHOOK }}
        run: |
          NOTIFY_MESSAGE="🚨 DeepSeek 广撒任务失败 $(date -u +%Y-%m-%d)
请到 GitHub Actions 查看 deepseek-broad 日志
（交易信号系统）" python3 scripts/notify-webhook.py
