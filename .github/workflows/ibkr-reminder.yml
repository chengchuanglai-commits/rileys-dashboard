name: IBKR 周一提醒

# 周一早上推飞书提醒 Riley 设置 IBKR paper。自终止:data/ibkr-setup-done 存在则脚本跳过。
on:
  schedule:
    - cron: '0 1 * * 1'   # 周一 01:00 UTC = 09:00 北京
  workflow_dispatch:

permissions:
  contents: read

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 1 }
      - name: paper设置提醒(完成则自跳过)
        continue-on-error: true
        env:
          NOTIFY_WEBHOOK: ${{ secrets.NOTIFY_WEBHOOK }}
        run: python scripts/ibkr-reminder.py
      # 小数股提醒已改本地自动探测(scripts/ibkr/fractional_probe.py + launchd周一22:00),
      # GitHub云端连不到本机Gateway故无法探测,这里不再发死提醒(避免与本地探针重复刷屏)。
