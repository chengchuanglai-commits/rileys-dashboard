name: 每日金融晨报生成

on:
  schedule:
    - cron: '30 23 * * 1-5'  # 07:30 北京时间，周一至周五 (UTC+8 → UTC 23:30 前一天)
  workflow_dispatch:           # 支持手动触发

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic yfinance

      - name: Generate morning note
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BUDGET_USD: "5"
        run: python scripts/generate-morning-note.py

      - name: Commit and push
        run: |
          git config --global user.email "morning-note-bot@users.noreply.github.com"
          git config --global user.name "Morning Note Bot"
          git add dashboard/morning-note.js dashboard/morning-note-history/
          git diff --staged --quiet || git commit -m "chore: 更新金融晨报 $(date -u +%Y-%m-%d)"
          git pull --rebase && git push
