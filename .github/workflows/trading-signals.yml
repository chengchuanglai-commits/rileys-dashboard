name: TradingAgents 每日信号

on:
  schedule:
    - cron: '30 12 * * 1-5'  # 20:30 北京时间，周一至周五 (UTC+8 → 12:30 UTC)
  workflow_dispatch:           # 支持手动触发
    inputs:
      backfill_date:
        description: '回填日期 (YYYY-MM-DD)，留空则使用当天'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # opt-in Node 24, required before 2026-06-16

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-tradingagents-${{ hashFiles('**/trading-signals.yml') }}
          restore-keys: ${{ runner.os }}-pip-tradingagents-

      - name: Install dependencies
        run: pip install yfinance anthropic "git+https://github.com/TauricResearch/TradingAgents.git"

      - name: Generate trading signals
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          BACKFILL_DATE: ${{ inputs.backfill_date }}
        run: python scripts/generate-trading-signals.py

      - name: Sync to database
        run: python scripts/sync-to-db.py

      - name: Generate daily self-check report
        run: python scripts/daily-report.py

      - name: Run backtest optimizer
        run: python scripts/backtest-optimizer.py

      - name: Bump version
        run: |
          V=$(date -u +%Y%m%d%H%M%S)
          echo "window.DASHBOARD_VERSION = \"$V\";" > dashboard/version.js
          sed -i "s/var BUILD=\"[0-9]*\"/var BUILD=\"$V\"/" dashboard/index.html

      - name: Commit and push
        run: |
          git config --global user.email "trading-signals-bot@users.noreply.github.com"
          git config --global user.name "Trading Signals Bot"
          git add dashboard/trading-signals.js dashboard/trading-signals-history/ data/trading.db
          git add dashboard/daily-report.json dashboard/daily-report.js dashboard/daily-reports/ 2>/dev/null || true
          git add "dashboard/trading-signals-history/"*-report.json 2>/dev/null || true
          git add dashboard/portfolio-b.js data/portfolio_b.json 2>/dev/null || true
          git add dashboard/portfolio-c.js data/portfolio_c.json 2>/dev/null || true
          git add dashboard/portfolio-d.js data/portfolio_d.json 2>/dev/null || true
          git add dashboard/backtest-results.js data/backtest_results.json 2>/dev/null || true
          git add dashboard/version.js dashboard/index.html
          git diff --staged --quiet || git commit -m "chore: 更新交易信号 $(date -u +%Y-%m-%d)"
          for i in 1 2 3 4 5; do
            git pull --rebase && git push && break
            echo "Push failed, retry $i/5 in 10s..."
            sleep 10
          done

      - name: Notify failure via WhatsApp
        if: failure()
        env:
          SYNC_URL: 'https://questrade-proxy.chengchuang-lai.workers.dev/sync'
          WORKFLOW_NAME: ${{ github.workflow }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python3 - <<'EOF'
          import urllib.request, json, os
          from datetime import datetime, timezone

          url = os.environ['SYNC_URL']
          workflow = os.environ['WORKFLOW_NAME']
          run_id = os.environ.get('GITHUB_RUN_ID', '')

          try:
              with urllib.request.urlopen(url, timeout=10) as r:
                  current = json.loads(r.read())
          except Exception:
              current = {}

          notifications = current.get('pending_notifications', [])
          notifications.append({
              'workflow': workflow,
              'run_id': run_id,
              'time': datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),
              'status': 'FAILED'
          })
          current['pending_notifications'] = notifications

          data = json.dumps(current).encode('utf-8')
          req = urllib.request.Request(url, data=data, headers={'Content-Type': 'application/json'}, method='POST')
          urllib.request.urlopen(req, timeout=10)
          print(f'[Notify] Failure notification queued for: {workflow}')
          EOF
