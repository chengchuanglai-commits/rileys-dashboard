name: TradingAgents 每日信号

on:
  schedule:
    - cron: '30 11 * * 1-5'  # 11:30 UTC = 美东 7:30 AM(开盘前2h，盘前出信号留足准备时间) = 北京19:30
  workflow_dispatch:           # 支持手动触发
    inputs:
      backfill_date:
        description: '回填日期 (YYYY-MM-DD)，留空则使用当天'
        required: false
        default: ''

permissions:
  contents: write

# 防止两个 run 同时跑/同时提交（6/10 撞车导致信号丢失的根因）。
# 第二个被触发的 run 排队等待，不取消正在跑的（避免已花的 API 分析费白费）。
concurrency:
  group: trading-pipeline   # 与 refresh-portfolio.yml 共用，防两个提交portfolio的run撞车
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 100
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # opt-in Node 24, required before 2026-06-16

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-tradingagents-${{ hashFiles('**/trading-signals.yml') }}
          restore-keys: ${{ runner.os }}-pip-tradingagents-

      - name: Install dependencies
        run: pip install yfinance anthropic lxml "git+https://github.com/TauricResearch/TradingAgents.git"

      - name: Notify start via WhatsApp
        continue-on-error: true
        env:
          SYNC_URL: 'https://questrade-proxy.chengchuang-lai.workers.dev/sync'
        run: |
          python3 - <<'EOF'
          import urllib.request, json, os
          from datetime import datetime, timezone, date

          url = os.environ['SYNC_URL']
          now = datetime.now(timezone.utc)
          today = date.today().isoformat()
          time_str = now.strftime('%H:%M UTC')

          message = f"🚀 {today} 交易任务开始\n扫描 S&P 600 → AI 分析 → 生成信号\n预计 40 分钟后完成"

          UA = 'Mozilla/5.0 (compatible; trading-bot/1.0)'

          try:
              get_req = urllib.request.Request(url, headers={'User-Agent': UA})
              with urllib.request.urlopen(get_req, timeout=10) as r:
                  current = json.loads(r.read())
          except Exception:
              current = {}

          notifications = current.get('pending_notifications', [])
          notifications.append({
              'time': now.strftime('%Y-%m-%dT%H:%M:%SZ'),
              'status': 'STARTED',
              'message': message
          })
          current['pending_notifications'] = notifications

          data = json.dumps(current, ensure_ascii=False).encode('utf-8')
          req = urllib.request.Request(url, data=data, headers={'Content-Type': 'application/json', 'User-Agent': UA}, method='POST')
          urllib.request.urlopen(req, timeout=10)
          print(f'[Notify] Start notification queued: {message}')
          EOF

      - name: Run stock screener
        run: python scripts/screen-stocks.py

      - name: Generate trading signals
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          BACKFILL_DATE: ${{ inputs.backfill_date }}
        run: python scripts/generate-trading-signals.py

      - name: Sync to database
        run: python scripts/sync-to-db.py

      - name: Generate daily self-check report
        run: python scripts/daily-report.py

      - name: Run backtest optimizer
        run: python scripts/backtest-optimizer.py

      - name: Update Plan E portfolio
        run: python scripts/backfill-portfolio-e.py

      - name: Update Plan F portfolio
        run: python scripts/backfill-portfolio-f.py

      - name: Update Plan G portfolio
        run: python scripts/backfill-portfolio-g.py

      - name: Update Plan H portfolio (历史最优参数)
        run: python scripts/backfill-portfolio-h.py

      - name: Analyze signal edge (vs SPY)
        run: python scripts/analyze-signal-edge.py
        continue-on-error: true

      - name: Bump version
        run: |
          V=$(date -u +%Y%m%d%H%M%S)
          echo "window.DASHBOARD_VERSION = \"$V\";" > dashboard/version.js
          sed -i "s/var BUILD=\"[0-9]*\"/var BUILD=\"$V\"/" dashboard/index.html

      - name: Commit and push
        run: |
          git config --global user.email "trading-signals-bot@users.noreply.github.com"
          git config --global user.name "Trading Signals Bot"
          git add dashboard/trading-signals.js dashboard/trading-signals-history/ data/trading.db
          git add dashboard/daily-report.json dashboard/daily-report.js dashboard/daily-reports/ 2>/dev/null || true
          git add "dashboard/trading-signals-history/"*-report.json 2>/dev/null || true
          git add dashboard/portfolio-b.js data/portfolio_b.json 2>/dev/null || true
          git add dashboard/portfolio-c.js data/portfolio_c.json 2>/dev/null || true
          git add dashboard/portfolio-d.js data/portfolio_d.json 2>/dev/null || true
          git add dashboard/portfolio-e.js data/portfolio_e.json 2>/dev/null || true
          git add dashboard/portfolio-f.js data/portfolio_f.json 2>/dev/null || true
          git add dashboard/portfolio-g.js data/portfolio_g.json 2>/dev/null || true
          git add dashboard/portfolio-h.js data/portfolio_h.json 2>/dev/null || true
          git add dashboard/backtest-results.js data/backtest_results.json 2>/dev/null || true
          git add data/screened-stocks.json data/screened-stocks-history/ 2>/dev/null || true
          git add dashboard/signal-edge.js 2>/dev/null || true
          git add dashboard/version.js dashboard/index.html
          git diff --staged --quiet || git commit -m "chore: 更新交易信号 $(date -u +%Y-%m-%d)"
          pushed=0
          for i in 1 2 3 4 5; do
            if git pull --rebase && git push; then pushed=1; break; fi
            echo "Push failed, retry $i/5 in 10s..."
            sleep 10
          done
          if [ "$pushed" -ne 1 ]; then
            echo "::error::Push failed after 5 retries — 信号未进库，job 标记失败以触发告警"
            exit 1
          fi

      - name: Notify success via WhatsApp
        if: success()
        continue-on-error: true
        env:
          SYNC_URL: 'https://questrade-proxy.chengchuang-lai.workers.dev/sync'
        run: |
          python3 - <<'EOF'
          import urllib.request, json, os
          from datetime import datetime, timezone, date

          url = os.environ['SYNC_URL']
          today = date.today().isoformat()

          # Read today's signals
          signal_file = f"dashboard/trading-signals-history/{today}.json"
          signals_data = {}
          if os.path.exists(signal_file):
              with open(signal_file) as f:
                  signals_data = json.load(f)

          # Read market regime
          regime_label = "🟡 震荡"
          vix_str = ""
          spy_ma_str = ""
          try:
              with open("data/screened-stocks.json") as f:
                  screened = json.load(f)
              regime = screened.get("regime") or "neutral"
              regime_data = screened.get("regime_data") or {}
              emoji_map = {"bull": "🟢 牛市", "bear": "🔴 熊市", "neutral": "🟡 震荡"}
              regime_label = emoji_map.get(regime, "🟡 震荡")
              vix = regime_data.get("vix", 0)
              spy_ma = regime_data.get("spy_vs_200ma", 0)
              vix_str = f"VIX: {vix:.1f}"
              spy_ma_str = f"SPY vs 200MA: {spy_ma:+.1f}%"
          except Exception:
              pass

          # Format signal lines
          signal_lines = []
          for s in signals_data.get("signals", [])[:5]:
              action = s.get("action", "?")
              ticker = s.get("ticker", "?")
              price = s.get("current_price", 0)
              tp = s.get("target_price", 0)
              sl = s.get("stop_loss", 0)
              icon = "🟢" if action == "BUY" else "🔴"
              signal_lines.append(f"{icon} {action} {ticker} @ ${price:.2f}\n   TP ${tp:.2f} | SL ${sl:.2f} | 2日")

          if not signal_lines:
              signal_lines = ["(今日无信号)"]

          parts = [f"📊 {today} 交易信号\n"]
          parts.extend(signal_lines)
          market_parts = [p for p in [vix_str, spy_ma_str] if p]
          parts.append(f"\n市场状态：{regime_label}")
          if market_parts:
              parts.append(" | ".join(market_parts))

          message = "\n".join(parts)

          # Queue notification
          UA = 'Mozilla/5.0 (compatible; trading-bot/1.0)'
          try:
              get_req = urllib.request.Request(url, headers={'User-Agent': UA})
              with urllib.request.urlopen(get_req, timeout=10) as r:
                  current = json.loads(r.read())
          except Exception:
              current = {}

          notifications = current.get('pending_notifications', [])
          notifications.append({
              'workflow': 'TradingAgents 每日信号',
              'time': datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),
              'status': 'SUCCESS',
              'message': message
          })
          current['pending_notifications'] = notifications

          data = json.dumps(current, ensure_ascii=False).encode('utf-8')
          req = urllib.request.Request(url, data=data, headers={'Content-Type': 'application/json', 'User-Agent': UA}, method='POST')
          urllib.request.urlopen(req, timeout=10)
          print(f'[Notify] Success notification queued')
          print(f'Message preview:\n{message}')
          EOF

      - name: Notify failure via WhatsApp
        if: failure() || cancelled()
        continue-on-error: true
        env:
          SYNC_URL: 'https://questrade-proxy.chengchuang-lai.workers.dev/sync'
          WORKFLOW_NAME: ${{ github.workflow }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python3 - <<'EOF'
          import urllib.request, json, os
          from datetime import datetime, timezone

          url = os.environ['SYNC_URL']
          workflow = os.environ['WORKFLOW_NAME']
          run_id = os.environ.get('GITHUB_RUN_ID', '')

          UA = 'Mozilla/5.0 (compatible; trading-bot/1.0)'
          try:
              get_req = urllib.request.Request(url, headers={'User-Agent': UA})
              with urllib.request.urlopen(get_req, timeout=10) as r:
                  current = json.loads(r.read())
          except Exception:
              current = {}

          notifications = current.get('pending_notifications', [])
          notifications.append({
              'workflow': workflow,
              'run_id': run_id,
              'time': datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),
              'status': 'FAILED'
          })
          current['pending_notifications'] = notifications

          data = json.dumps(current).encode('utf-8')
          req = urllib.request.Request(url, data=data, headers={'Content-Type': 'application/json', 'User-Agent': UA}, method='POST')
          urllib.request.urlopen(req, timeout=10)
          print(f'[Notify] Failure notification queued for: {workflow}')
          EOF
