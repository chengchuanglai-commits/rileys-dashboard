name: B-quant 多因子

# 纯量化多因子选股(FMP基本面+动量) → ATR定价+风险定额+每周再平衡 → B-quant 模拟盘。全程无 AI。
# 选股器每日归档(当时基本面=无前视),回填读归档模拟。基本面缓存周更,日常调用极少。

on:
  schedule:
    - cron: '30 12 * * 1-5'   # 12:30 UTC,主信号/广撒之后
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: trading-pipeline
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.c.outputs.run }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 1 }
      - id: c
        run: |
          if [ "$(date -u +%u)" -ge 6 ]; then echo "周末跳过"; echo "run=false" >> "$GITHUB_OUTPUT"; exit 0; fi
          if [ "${{ github.event_name }}" = "schedule" ] && [ -f "data/multifactor-history/$(date -u +%F).json" ]; then
            echo "今日已归档,跳过重复触发"; echo "run=false" >> "$GITHUB_OUTPUT"; exit 0; fi
          echo "run=true" >> "$GITHUB_OUTPUT"

  bquant:
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 1 }
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Install deps
        run: pip install yfinance lxml pandas numpy "git+https://github.com/TauricResearch/TradingAgents.git"

      - name: 多因子选股(归档)
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python scripts/screen-multifactor.py

      - name: B-quant 回填(读归档,ATR定价+风险定额+周再平衡)
        run: python scripts/backfill-portfolio-bq.py

      # 【已停用 2026-07-03】B-AI DeepSeek 分析——每天烧~39分钟V4-pro的钱、结果还常因git冲突没保存(纯浪费)。
      # bai腿+1.1%跟不赢指数,不值得。省一半DeepSeek成本(~10-15→~5-7元/天)。hds(shadow)那条有价值的腿另留。
      # 要恢复:取消下面两步注释即可。
      # - name: B-AI — DeepSeek 分析多因子候选
      #   continue-on-error: true
      #   env:
      #     DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      #     FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      #   run: python scripts/generate-deepseek-multifactor.py
      # - name: B-AI 回填(DeepSeek决定+同定价)
      #   continue-on-error: true
      #   run: python scripts/backfill-portfolio-bai.py

      - name: 动量/趋势选股(Minervini趋势模板+J Law M.E.T.A.,归档)
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python scripts/screen-momentum.py

      - name: MOM-H 回填(动量信号 + Plan H出场)
        run: python scripts/backfill-portfolio-momh.py

      - name: MOM-MA 回填(动量信号 + J Law 10/20MA移动止盈)
        run: python scripts/backfill-portfolio-momma.py

      - name: 复利曲线 + 动态配置引擎(汇总全部腿,此时数据最全)
        continue-on-error: true
        run: |
          python scripts/compare-compounded.py || true
          python scripts/compute-allocation.py || true

      - name: 每日决策推送(飞书)
        continue-on-error: true
        env:
          NOTIFY_WEBHOOK: ${{ secrets.NOTIFY_WEBHOOK }}
        run: python scripts/daily-digest.py || true

      - name: 提交
        run: |
          git config user.name "bquant-bot"
          git config user.email "bquant-bot@users.noreply.github.com"
          git add data/multifactor-history/ data/screened-multifactor.json data/fundamentals-cache.json 2>/dev/null || true
          git add data/multifactor-ai-history/ data/portfolio_bq.json dashboard/portfolio-bq.js 2>/dev/null || true
          git add data/portfolio_bai.json dashboard/portfolio-bai.js 2>/dev/null || true
          git add data/momentum-history/ data/screened-momentum.json 2>/dev/null || true
          git add data/portfolio_momh.json data/portfolio_momma.json dashboard/portfolio-momh.js dashboard/portfolio-momma.js 2>/dev/null || true
          git add data/allocation.json dashboard/allocation.js dashboard/compounded-curves.js data/digest-state.json 2>/dev/null || true
          V=$(date -u +%Y%m%d%H%M%S)
          echo "window.DASHBOARD_VERSION = \"$V\";" > dashboard/version.js
          sed -i "s/var BUILD=\"[0-9]*\"/var BUILD=\"$V\"/" dashboard/index.html
          git add dashboard/version.js dashboard/index.html
          git diff --staged --quiet || git commit -m "B-quant 多因子 $(date -u +%Y-%m-%d)"
          for i in 1 2 3 4 5; do git pull --rebase origin main && git push origin main && exit 0; sleep 5; done
          exit 1

      - name: 飞书通知:B-quant
        if: success()
        continue-on-error: true
        env:
          NOTIFY_WEBHOOK: ${{ secrets.NOTIFY_WEBHOOK }}
        run: |
          python3 - <<'EOF'
          import json, os, runpy
          def line(path, name):
              try:
                  d = json.load(open(path)); s = d["stats"]
                  return f"{name}: 净值${s['portfolio_value']} 已实现${s['total_realized_pnl_usd']:+.0f} 浮盈${s['open_unrealized_pnl_usd']:+.0f} (平{s['total_trades']}笔 胜率{s['win_rate']}% 持仓{len(d['open_positions'])})"
              except Exception:
                  return f"{name}: 无数据"
          msg = ["📊 独立量化腿 " + __import__("datetime").date.today().isoformat(),
                 line("data/portfolio_bq.json", "B-quant(纯量化)"),
                 line("data/portfolio_bai.json", "B-AI(DeepSeek决定)"),
                 line("data/portfolio_momh.json", "MOM-H(动量+H出场)"),
                 line("data/portfolio_momma.json", "MOM-MA(动量+20MA移动止盈)"),
                 "（交易信号系统）"]
          os.environ["NOTIFY_MESSAGE"] = "\n".join(msg)
          runpy.run_path("scripts/notify-webhook.py", run_name="__main__")
          EOF
