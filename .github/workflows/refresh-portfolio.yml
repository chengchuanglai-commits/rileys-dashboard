name: 盘中持仓刷新

on:
  schedule:
    - cron: '*/30 13-20 * * 1-5'  # 美东盘中 9:30-16:00，每30分钟（UTC 13-20）
  workflow_dispatch:

permissions:
  contents: write

# 与信号工作流共用同一并发组，防止两个会提交 portfolio 的 run 同时跑撞车
# （盘中刷新若超过30分钟会和下一次刷新撞车；慢信号run若拖到13:00也会和刷新撞车）
concurrency:
  group: trading-pipeline
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-refresh-${{ hashFiles('**/refresh-portfolio.yml') }}
          restore-keys: ${{ runner.os }}-pip-refresh-

      - name: Install dependencies
        run: pip install yfinance

      - name: Refresh portfolio B, C, D & E
        run: |
          python scripts/backfill-portfolio-b.py
          python scripts/backfill-portfolio-c.py
          python scripts/backfill-portfolio-d.py
          python scripts/backfill-portfolio-e.py
          python scripts/backfill-portfolio-f.py
          python scripts/backfill-portfolio-mn.py
          python scripts/backfill-portfolio-h.py
          python scripts/backfill-portfolio-hds.py
          python scripts/backfill-portfolio-spy.py

      - name: Regenerate daily report
        run: python scripts/daily-report.py

      - name: Bump version
        run: |
          V=$(date -u +%Y%m%d%H%M%S)
          echo "window.DASHBOARD_VERSION = \"$V\";" > dashboard/version.js
          sed -i "s/var BUILD=\"[0-9]*\"/var BUILD=\"$V\"/" dashboard/index.html

      - name: Commit and push
        run: |
          git config --global user.email "portfolio-refresh-bot@users.noreply.github.com"
          git config --global user.name "Portfolio Refresh Bot"
          git add dashboard/portfolio-b.js data/portfolio_b.json
          git add dashboard/portfolio-c.js data/portfolio_c.json
          git add dashboard/portfolio-d.js data/portfolio_d.json 2>/dev/null || true
          git add dashboard/portfolio-e.js data/portfolio_e.json 2>/dev/null || true
          git add dashboard/portfolio-f.js data/portfolio_f.json 2>/dev/null || true
          git add dashboard/portfolio-mn.js data/portfolio_mn.json 2>/dev/null || true
          git add dashboard/portfolio-h.js data/portfolio_h.json 2>/dev/null || true
          git add dashboard/portfolio-hds.js data/portfolio_hds.json 2>/dev/null || true
          git add dashboard/portfolio-spy.js data/portfolio_spy.json 2>/dev/null || true
          git add dashboard/daily-report.js dashboard/daily-report.json dashboard/daily-reports/ 2>/dev/null || true
          git add dashboard/version.js dashboard/index.html
          git diff --staged --quiet || git commit -m "chore: 刷新持仓+报告 $(date -u +'%Y-%m-%d %H:%M') UTC"
          pushed=0
          for i in 1 2 3 4 5; do
            if git pull --rebase && git push; then pushed=1; break; fi
            echo "Push failed, retry $i/5 in 10s..."
            sleep 10
          done
          if [ "$pushed" -ne 1 ]; then
            echo "::error::盘中刷新 push 5次全失败 — 持仓数据未更新"
            exit 1
          fi
